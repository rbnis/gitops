apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-auth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: grafana-auth
    template:
      data:
        admin-user: "{{ .username }}"
        admin-password: "{{ .password }}"
        oauth-client-id: "{{ .kanidmClientId }}"
        oauth-client-secret: "{{ .kanidmClientSecret }}"
  data:
    - secretKey: username
      remoteRef:
        key: GRAFANA_ADMIN_USERNAME
    - secretKey: password
      remoteRef:
        key: GRAFANA_ADMIN_PASSWORD
    - secretKey: kanidmClientId
      remoteRef:
        key: GRAFANA_AUTH_KANIDM_CLIENT_ID
    - secretKey: kanidmClientSecret
      remoteRef:
        key: GRAFANA_AUTH_KANIDM_CLIENT_SECRET
