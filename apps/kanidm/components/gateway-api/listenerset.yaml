apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: kanidm
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: shared-gateway
    namespace: infra
  listeners:
    - name: ldaps
      port: 636
      protocol: TLS
      hostname: auth.rbn.is
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
