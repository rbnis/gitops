apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: grafana
spec:
  kanidmRef:
    name: rbnis

  displayname: Grafana
  image:
    url: https://raw.githubusercontent.com/grafana/grafana/refs/heads/main/public/img/grafana_icon.svg
  origin: https://grafana.rbn.is
  redirectUrl:
    - https://grafana.rbn.is/login/generic_oauth

  scopeMap:
    - group: grafana-access
      scopes:
        - email
        - openid
        - profile
        - groups

  claimMap:
    - name: grafana_role
      joinStrategy: array
      valuesMap:
        - group: grafana-superadmins
          values:
            - GrafanaAdmin
        - group: grafana-admins
          values:
            - Admin
        - group: grafana-editors
          values:
            - Editor
